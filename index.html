<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biti</title>
<meta name="description" content="Biti — linkek egy helyen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1E24;
    --paper:#F4F1E8;
    --line:#D8D2C0;
    --accent:#F2542D;
    --accent-dim:#F2542D33;
    --mono:'JetBrains Mono', monospace;
    --display:'Oswald', sans-serif;
    --body:'IBM Plex Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--body);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:480px;
  }
  .bib{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:36px;
  }
  .bib-number{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.12em;
    color:var(--accent);
    border:1px solid var(--accent);
    border-radius:999px;
    padding:5px 12px;
    white-space:nowrap;
  }
  .bib-line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, var(--accent), transparent);
  }
  h1{
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(40px, 11vw, 56px);
    letter-spacing:0.01em;
    margin:0 0 6px 0;
    text-transform:uppercase;
  }
  .tagline{
    font-size:15px;
    color:#C9C2AD;
    margin:0 0 40px 0;
    line-height:1.5;
    max-width:38ch;
  }
  .sheet-label{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.14em;
    color:#8A8470;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    padding:0 2px 10px 2px;
    border-bottom:1px solid var(--line);
    margin-bottom:4px;
  }
  #links{
    list-style:none;
    margin:0;
    padding:0;
  }
  .split{
    display:flex;
    align-items:center;
    gap:16px;
    padding:18px 2px;
    border-bottom:1px solid #2A3B41;
    text-decoration:none;
    color:var(--paper);
    transition:padding-left 0.18s ease, color 0.18s ease;
  }
  .split:hover, .split:focus-visible{
    padding-left:8px;
    color:var(--accent);
    outline:none;
  }
  .split-num{
    font-family:var(--mono);
    font-size:13px;
    color:#8A8470;
    width:44px;
    flex-shrink:0;
  }
  .split-name{
    flex:1;
    font-size:17px;
    font-weight:500;
  }
  .split-sub{
    display:block;
    font-size:12.5px;
    color:#8A8470;
    font-weight:400;
    margin-top:2px;
  }
  .split-arrow{
    font-family:var(--mono);
    font-size:16px;
    color:var(--accent);
    flex-shrink:0;
  }
  footer{
    margin-top:40px;
    font-family:var(--mono);
    font-size:11.5px;
    color:#5C6A6E;
    text-align:center;
    letter-spacing:0.04em;
  }
  @media (prefers-reduced-motion: reduce){
    .split{transition:none;}
  }
</style>
</head>
<body>

<div class="card">

  <div class="bib">
    <span class="bib-number">BIB #01</span>
    <span class="bib-line"></span>
  </div>

  <h1>Norbert Bittera - Biti</h1>
  <p class="tagline">Welcome! I like running, Spartan race/training, gaming, working in IT — this is me.</p>

  <div class="sheet-label">
    <span>Channel</span>
    <span>Click</span>
  </div>
  <ul id="links"></ul>

  <footer>Last updated: 2026.07</footer>
</div>

<script>
  // ── Ide vedd fel / itt szerkeszd a linkjeidet ──────────────────────
  // name:   megjelenő platform név
  // sub:    (opcionális) alcím / handle
  // url:    ahova a kattintás vezet
  const LINKS = [
    { name: "Facebook",  sub: "@norbert.bittera", url: "https://facebook.com/norbert.bittera" },
    { name: "Instagram", sub: "@biti995", url: "https://instagram.com/biti995" },
	{ name: "Strava", sub: " ", url: "https://strava.app.link/pOBITRQmN4b" },
    // Új sor hozzáadásához csak másolj be egy ilyen sort:
    // { name: "Strava", sub: "@biti", url: "https://strava.com/" },
  ];
  // ────────────────────────────────────────────────────────────────────

  const list = document.getElementById('links');
  LINKS.forEach((link, i) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = link.url;
    a.className = 'split';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <span class="split-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="split-name">${link.name}${link.sub ? `<span class="split-sub">${link.sub}</span>` : ''}</span>
      <span class="split-arrow">→</span>
    `;
    li.appendChild(a);
    list.appendChild(li);
  });
</script>

</body>
</html>
